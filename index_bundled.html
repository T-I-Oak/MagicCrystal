        // --- INPUT SEGMENT ---
        class Input {
            constructor() {
                this.stick = 0;
                this.trigger = false;
                this.keys = {};
                this.editTogglePressed = false;
                this.savePressed = false;
                this.loadPressed = false;

                window.addEventListener('keydown', (e) => this.handleKey(e, true));
                window.addEventListener('keyup', (e) => this.handleKey(e, false));
            }
            handleKey(e, isDown) {
                this.keys[e.key] = isDown;
                this.updateState();
            }
            updateState() {
                // Game Input
                const up = this.keys.ArrowUp || this.keys.w || this.keys['8'];
                const right = this.keys.ArrowRight || this.keys.d || this.keys['6'];
                const down = this.keys.ArrowDown || this.keys.s || this.keys['5'] || this.keys['2'] || this.keys[' ']; // Down: 5, 2, Space
                const left = this.keys.ArrowLeft || this.keys.a || this.keys['4'];

                // Context-Sensitive Actions
                this.jump = this.keys.z; // Game Jump: Z ONLY (X handles GiveUp/Back)
                this.confirm = this.keys.z || this.keys.Enter || this.keys[' ']; // Menu Confirm: Z, Enter, Space (No X)

                this.giveUp = this.keys.x;
                this.smartLeft = this.keys.q || this.keys['7']; // 7 = Q
                this.smartRight = this.keys.e || this.keys['9']; // 9 = E

                if (up && !down) {
                    if (left) this.stick = 8; else if (right) this.stick = 2; else this.stick = 1;
                } else if (down && !up) {
                    if (left) this.stick = 6; else if (right) this.stick = 4; else this.stick = 5;
                } else if (left && !right) this.stick = 7;
                else if (right && !left) this.stick = 3;
                else this.stick = 0;
            }
            isPressed(key) { return this.keys[key]; }
        }

        // --- ASSETS SEGMENT ---
        class Assets {
            constructor() {
                this.tiles = {};
                this.player = {};
                this.cursor = null;
                this.initGenerators();
            }

            createRect(w, h, color) { // Fallback/Utility
                const c = document.createElement('canvas'); c.width = w; c.height = h;
                const ctx = c.getContext('2d');
                ctx.fillStyle = color; ctx.fillRect(0, 0, w, h);
                return c;
            }


            initGenerators() {
                // High-Res Vector Graphics (Canvas API)
                // Tile Size: 40x40

                // Helper to create tile canvas
                const createTile = () => {
                    const c = document.createElement('canvas');
                    c.width = 40; c.height = 40;
                    return { c, ctx: c.getContext('2d') };
                };

                // 1. DIRT: Rich, Organic Soil (Layered)
                const dirt = createTile();
                const dCtx = dirt.ctx;
                // Base
                dCtx.fillStyle = '#4a3024'; // Mid Brown
                dCtx.fillRect(0, 0, 40, 40);
                // Layers/Texture
                dCtx.fillStyle = '#3e2723'; // Darker
                dCtx.beginPath();
                dCtx.moveTo(0, 10); dCtx.quadraticCurveTo(10, 5, 20, 12); dCtx.quadraticCurveTo(30, 20, 40, 10);
                dCtx.lineTo(40, 40); dCtx.lineTo(0, 40);
                dCtx.fill();
                dCtx.fillStyle = '#5d4037'; // Even Darker patches
                dCtx.beginPath();
                dCtx.arc(10, 30, 5, 0, Math.PI * 2);
                dCtx.arc(30, 25, 4, 0, Math.PI * 2);
                dCtx.fill();
                this.tiles[1] = dirt.c;

                // 2. ROCK: Chiseled Stone Block (Beveled)
                const rock = createTile();
                const rCtx = rock.ctx;
                rCtx.fillStyle = '#455a64'; // Base Grey
                rCtx.fillRect(0, 0, 40, 40);
                // Bevel High (Top/Left)
                rCtx.fillStyle = '#cfd8dc';
                rCtx.beginPath(); rCtx.moveTo(0, 0); rCtx.lineTo(40, 0); rCtx.lineTo(35, 5); rCtx.lineTo(5, 5); rCtx.lineTo(5, 35); rCtx.lineTo(0, 40); rCtx.fill();
                // Bevel Low (Bottom/Right)
                rCtx.fillStyle = '#263238';
                rCtx.beginPath(); rCtx.moveTo(40, 40); rCtx.lineTo(0, 40); rCtx.lineTo(5, 35); rCtx.lineTo(35, 35); rCtx.lineTo(35, 5); rCtx.lineTo(40, 0); rCtx.fill();
                // Center Face
                rCtx.fillStyle = '#546e7a';
                rCtx.fillRect(5, 5, 30, 30);
                // Detail cracks
                rCtx.strokeStyle = '#37474f';
                rCtx.lineWidth = 1;
                rCtx.beginPath(); rCtx.moveTo(10, 10); rCtx.lineTo(15, 18); rCtx.stroke();
                this.tiles[2] = rock.c;

                // 3. PORTAL: Glowing Abyss
                const portal = createTile();
                const pCtx = portal.ctx;
                // Ring
                const gradRing = pCtx.createRadialGradient(20, 20, 10, 20, 20, 18);
                gradRing.addColorStop(0, '#4a148c'); // Deep Purple
                gradRing.addColorStop(0.6, '#ab47bc'); // Lighter
                gradRing.addColorStop(1, '#4a148c');
                pCtx.fillStyle = gradRing;
                pCtx.beginPath(); pCtx.arc(20, 20, 19, 0, Math.PI * 2); pCtx.fill();
                // Abyss Center (Infinite Dark)
                const gradVoid = pCtx.createRadialGradient(20, 20, 2, 20, 20, 14);
                gradVoid.addColorStop(0, '#000000'); // Pure Black
                gradVoid.addColorStop(0.8, '#120021'); // Deepest Violet
                gradVoid.addColorStop(1, '#4a148c');
                pCtx.fillStyle = gradVoid;
                pCtx.beginPath(); pCtx.arc(20, 20, 14, 0, Math.PI * 2); pCtx.fill();
                this.tiles[3] = portal.c;

                // 4. RED CRYSTAL (Ruby)
                const redC = createTile();
                const rcCtx = redC.ctx;
                // Shadow underneath
                rcCtx.fillStyle = 'rgba(0,0,0,0.3)';
                rcCtx.beginPath(); rcCtx.ellipse(20, 36, 10, 4, 0, 0, Math.PI * 2); rcCtx.fill();
                // Gem Shape (Hexagon/Diamond)
                rcCtx.beginPath();
                rcCtx.moveTo(10, 15); rcCtx.lineTo(20, 5); rcCtx.lineTo(30, 15);
                rcCtx.lineTo(30, 28); rcCtx.lineTo(20, 38); rcCtx.lineTo(10, 28);
                rcCtx.closePath();
                // Gradient Fill
                const rGrad = rcCtx.createLinearGradient(0, 0, 40, 40);
                rGrad.addColorStop(0, '#ffccbc'); // Highlight
                rGrad.addColorStop(0.3, '#d50000'); // Standard Red
                rGrad.addColorStop(1, '#b71c1c'); // Deep Red
                rcCtx.fillStyle = rGrad;
                rcCtx.fill();
                rcCtx.lineWidth = 1; rcCtx.strokeStyle = '#8c0000'; rcCtx.stroke();
                // Facets (White Shine)
                rcCtx.fillStyle = 'rgba(255,255,255,0.4)';
                rcCtx.beginPath(); rcCtx.moveTo(10, 15); rcCtx.lineTo(20, 5); rcCtx.lineTo(20, 15); rcCtx.fill();
                this.tiles[4] = redC.c;

                // 5. BLUE CRYSTAL (Sapphire)
                const blueC = createTile();
                const bcCtx = blueC.ctx;
                // Shadow
                bcCtx.fillStyle = 'rgba(0,0,0,0.3)';
                bcCtx.beginPath(); bcCtx.ellipse(20, 36, 10, 4, 0, 0, Math.PI * 2); bcCtx.fill();
                // Shape
                bcCtx.beginPath();
                bcCtx.moveTo(10, 15); bcCtx.lineTo(20, 5); bcCtx.lineTo(30, 15);
                bcCtx.lineTo(30, 28); bcCtx.lineTo(20, 38); bcCtx.lineTo(10, 28);
                bcCtx.closePath();
                // Gradient
                const bGrad = bcCtx.createLinearGradient(0, 0, 40, 40);
                bGrad.addColorStop(0, '#81d4fa');
                bGrad.addColorStop(0.3, '#0288d1');
                bGrad.addColorStop(1, '#01579b');
                bcCtx.fillStyle = bGrad;
                bcCtx.fill();
                bcCtx.lineWidth = 1; bcCtx.strokeStyle = '#004c8c'; bcCtx.stroke();
                // Facets
                bcCtx.fillStyle = 'rgba(255,255,255,0.4)';
                bcCtx.beginPath(); bcCtx.moveTo(10, 15); bcCtx.lineTo(20, 5); bcCtx.lineTo(20, 15); bcCtx.fill();
                this.tiles[5] = blueC.c;

                // 6. DIRT TRACE (Dark Tunnel)
                const dTrace = createTile();
                const dtCtx = dTrace.ctx;
                dtCtx.fillStyle = '#2e1c16'; // Very dark soil
                dtCtx.fillRect(0, 0, 40, 40);
                dtCtx.fillStyle = '#3e2723';
                dtCtx.fillRect(0, 0, 8, 40);
                dtCtx.fillRect(32, 0, 8, 40);
                this.tiles[6] = dTrace.c;

                // 7. ROCK TRACE (Forming Stone / Lattice)
                const rTrace = createTile();
                const rtCtx = rTrace.ctx;
                rtCtx.fillStyle = '#455a64'; // Base Rock
                rtCtx.fillRect(0, 0, 40, 40);
                rtCtx.strokeStyle = '#263238';
                rtCtx.lineWidth = 2;
                rtCtx.beginPath();
                rtCtx.moveTo(0, 10); rtCtx.lineTo(40, 10);
                rtCtx.moveTo(0, 30); rtCtx.lineTo(40, 30);
                rtCtx.moveTo(10, 0); rtCtx.lineTo(10, 40);
                rtCtx.moveTo(30, 0); rtCtx.lineTo(30, 40);
                rtCtx.stroke();
                rtCtx.fillStyle = 'rgba(0,0,0,0.5)';
                rtCtx.fillRect(10, 10, 20, 20);
                this.tiles[7] = rTrace.c;




                // PLAYER: MAGE (High Res Vector)
                const drawMage = (ctx, facingRight, action) => { // action: stand, jump, fall
                    ctx.clearRect(0, 0, 40, 40);
                    ctx.save();
                    if (!facingRight) {
                        ctx.translate(40, 0);
                        ctx.scale(-1, 1);
                    }

                    // Body/Robe
                    ctx.fillStyle = '#311b92'; // Deep Purple Robe
                    ctx.beginPath();
                    ctx.moveTo(15, 20);
                    ctx.lineTo(25, 20);
                    ctx.lineTo(30, 38); // Skirt
                    ctx.lineTo(10, 38);
                    ctx.fill();

                    // Head
                    ctx.fillStyle = '#ffccbc'; // Skin
                    ctx.beginPath(); ctx.arc(20, 16, 7, 0, Math.PI * 2); ctx.fill();

                    // Beard
                    ctx.fillStyle = '#cfd8dc'; // White Beard
                    ctx.beginPath(); ctx.arc(20, 18, 5, 0, Math.PI); ctx.fill();

                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(22, 16, 1, 0, Math.PI * 2); ctx.fill();

                    // HAT (WIZARD CONE) - Tilted BACK (Left)
                    // Pivot at head top (20, 10)
                    ctx.fillStyle = '#1a237e'; // Dark Blue Hat
                    ctx.beginPath();
                    // Brim
                    ctx.ellipse(20, 10, 10, 3, -0.2, 0, Math.PI * 2);
                    ctx.fill();
                    // Cone (Tilting Left)
                    ctx.beginPath();
                    ctx.moveTo(12, 10);
                    ctx.lineTo(27, 9);
                    ctx.lineTo(10, 0); // Tip far left
                    ctx.fill();

                    // STAFF
                    const staffX = 30; // Held in front
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(staffX, 38); // Ground
                    ctx.lineTo(staffX, 10); // Top
                    ctx.stroke();
                    // Orb
                    ctx.fillStyle = '#80d8ff';
                    ctx.beginPath(); ctx.arc(staffX, 8, 3, 0, Math.PI * 2); ctx.fill();

                    // Hands
                    ctx.fillStyle = '#ffccbc';
                    ctx.beginPath(); ctx.arc(staffX - 2, 25, 2, 0, Math.PI * 2); ctx.fill(); // Hand on staff

                    ctx.restore();
                };

                // Generate Player Sprites
                const pGen = (fn) => {
                    const c = document.createElement('canvas'); c.width = 40; c.height = 40;
                    fn(c.getContext('2d'));
                    return c;
                };

                this.player.standRight = pGen(ctx => drawMage(ctx, true, 'stand'));
                this.player.standLeft = pGen(ctx => drawMage(ctx, false, 'stand'));
                this.player.jumpRight = pGen(ctx => {
                    ctx.translate(0, -2); // Bounce up
                    drawMage(ctx, true, 'jump');
                });
                this.player.jumpLeft = pGen(ctx => {
                    ctx.translate(0, -2);
                    drawMage(ctx, false, 'jump');
                });
                this.player.fallRight = pGen(ctx => {
                    drawMage(ctx, true, 'fall'); // Maybe tilt?
                });
                this.player.fallLeft = pGen(ctx => {
                    drawMage(ctx, false, 'fall');
                });


                // BACKGROUND (Grid) - 40x40
                const bg = createTile();
                const bCtx = bg.ctx;
                bCtx.fillStyle = '#121212';
                bCtx.fillRect(0, 0, 40, 40);
                bCtx.strokeStyle = '#1a1a20';
                bCtx.lineWidth = 1;
                bCtx.strokeRect(0, 0, 40, 40);
                this.tiles[0] = bg.c;

                // Cursor
                const cur = createTile();
                cur.ctx.strokeStyle = 'gold'; cur.ctx.lineWidth = 2;
                cur.ctx.strokeRect(0, 0, 40, 40);
                this.cursor = cur.c;
            }

            // Removed old methods (createSprite, mirrorPattern) as they are obsolete for vector gen
            getTile(id) { return this.tiles[id] || this.tiles[0]; }
        }

        // --- LEVEL SEGMENT ---
        class Level {
            constructor(cols = 24, rows = 13) {
                this.cols = cols; this.rows = rows;
                this.data = new Array(rows).fill(0).map(() => new Array(cols).fill(0));
                // Initial load handled by game
            }
            loadStage(stageIndex) {
                // Bounds check
                if (stageIndex < 0) stageIndex = 0;
                if (stageIndex >= ALL_LEVELS.length) stageIndex = 0; // Loop or End? Loop for now.

                const stageData = ALL_LEVELS[stageIndex];
                // Deep Copy to avoid modifying the constant
                this.data = stageData.map(row => [...row]);
            }
            getTile(x, y) { if (x < 0 || x >= this.cols || y < 0 || y >= this.rows) return 2; return this.data[y][x]; }
            setTile(x, y, id) { if (x >= 0 && x < this.cols && y >= 0 && y < this.rows) this.data[y][x] = id; }
            serialize() { return JSON.stringify(this.data); }
            deserialize(json) {
                try {
                    const loadedData = JSON.parse(json);
                    if (loadedData.length === this.rows && loadedData[0].length === this.cols) {
                        this.data = loadedData;
                    } else {
                        console.warn("Save data dimension mismatch (Old version?). Reseting to default.");
                        // Data remains as generated in constructor
                    }
                }
                catch (e) { console.error("Load Failed", e); }
            }
            applyEarthquake() {
                for (let y = 0; y < this.rows; y++) {
                    for (let x = 0; x < this.cols; x++) {
                        // User Logic: Index 2(Dirt2/ID6) -> Dirt(1). Index 3(Rock2/ID7) -> Rock(2).
                        // Note: ID 6 is 'Dirt Trace', ID 7 is 'Rock Trace'
                        if (this.data[y][x] === 6) this.data[y][x] = 1;
                        else if (this.data[y][x] === 7) this.data[y][x] = 2;
                    }
                }
            }
        }

        // --- LEVEL EDITOR SEGMENT ---
        class LevelEditor {
            constructor(level) {
                this.level = level;
                this.cx = 4; // Cursor X
                this.cy = 4; // Cursor Y
                this.selectedTile = 1;
                this.cooldown = 0;
            }
            update(input) {
                if (this.cooldown > 0) this.cooldown--;

                // Movement
                if (this.cooldown === 0) {
                    if (input.keys.ArrowRight || input.keys.d) { this.cx = Math.min(this.cx + 1, this.level.cols - 1); this.cooldown = 5; }
                    else if (input.keys.ArrowLeft || input.keys.a) { this.cx = Math.max(this.cx - 1, 0); this.cooldown = 5; }
                    else if (input.keys.ArrowDown || input.keys.s) { this.cy = Math.min(this.cy + 1, this.level.rows - 1); this.cooldown = 5; }
                    else if (input.keys.ArrowUp || input.keys.w) { this.cy = Math.max(this.cy - 1, 0); this.cooldown = 5; }
                }

                // Tile Selection & Placement
                for (let i = 0; i <= 7; i++) {
                    if (input.keys[i.toString()]) {
                        this.selectedTile = i;
                        this.placeTile(i); // Immediate Placement
                    }
                }
            }

            placeTile(tileId) {
                // Single Portal Rule
                if (tileId === 3) {
                    // Placing New Portal -> Remove existing
                    for (let y = 0; y < this.level.rows; y++) {
                        for (let x = 0; x < this.level.cols; x++) {
                            if (this.level.getTile(x, y) === 3) this.level.setTile(x, y, 0);
                        }
                    }
                    this.level.setTile(this.cx, this.cy, 3);
                } else {
                    // Placing Other Tile -> Prevent overwriting Portal
                    if (this.level.getTile(this.cx, this.cy) !== 3) {
                        this.level.setTile(this.cx, this.cy, tileId);
                    }
                }
            }
        }

        // --- RENDERER SEGMENT ---
        class Renderer {
            constructor(ctx, assets) {
                this.ctx = ctx; this.assets = assets;
                this.tileWidth = 40; this.tileHeight = 40; // Updated to 40x40
                this.shakeX = 0;
                this.shakeY = 0;
            }
            render(level, player, editor, state, ES, game) {
                // Clear
                this.ctx.fillStyle = '#000'; this.ctx.fillRect(0, 0, this.ctx.canvas.width, this.ctx.canvas.height);

                if (state === 'TITLE') {
                    this.drawTitle(game);
                    return;
                }
                if (state === 'SELECT') {
                    this.drawSelect(game);
                    return;
                }

                if (state === 'GAMEOVER') {
                    this.ctx.fillStyle = '#fff'; this.ctx.font = '40px monospace';
                    this.ctx.fillText("GAME OVER", 350, 260);
                    return;
                }
                if (state === 'ALLCLEAR') {
                    this.ctx.fillStyle = '#ff0'; this.ctx.font = '40px monospace';
                    this.ctx.fillText("ALL CLEARED!", 320, 260);
                    return;
                }

                if (state === 'WAIT_START') {
                    this.ctx.save();
                    this.ctx.translate(this.shakeX, this.shakeY);
                    this.drawLevel(level);
                    this.drawPlayer(player);
                    this.ctx.restore();

                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '40px monospace';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText("STAGE " + (game.stage + 1), 480, 260);
                    this.ctx.textAlign = 'start';
                    return;
                }

                // === PLAY / EDITOR ===
                this.ctx.save();
                this.ctx.translate(this.shakeX, this.shakeY);

                // Draw Level
                this.drawLevel(level);

                // Draw Player & HUD
                if (state === 'PLAY') {
                    this.drawPlayer(player);

                    // HUD Update
                    if (game.hudLeft) {
                        let livesHtml = "";
                        if (game.lives < 6) {
                            for (let i = 0; i < game.lives; i++) livesHtml += `<img src="${game.playerIconUrl}" height="20" style="vertical-align:middle; margin-right:2px;">`;
                        } else {
                            livesHtml = `<img src="${game.playerIconUrl}" height="20" style="vertical-align:middle;"> x ${game.lives}`;
                        }
                        let crystalHtml = ` <span style="margin-left:10px;">CRYSTALS: ${game.crystalCount}</span>`;
                        game.hudLeft.innerHTML = livesHtml + crystalHtml;
                    }
                    if (game.hudRight) game.hudRight.textContent = `STAGE ${game.stage + 1}`;
                }

                if (state === 'EDITOR') {
                    this.ctx.drawImage(this.assets.cursor, editor.cx * this.tileWidth, editor.cy * this.tileHeight);
                    if (game.hudLeft) game.hudLeft.textContent = "EDITOR MODE";
                }

                this.ctx.restore();

                // Earthquake
                if (ES > 0) {
                    this.ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    const barWidth = (this.ctx.canvas.width * ES) / 60;
                    this.ctx.fillRect(0, this.ctx.canvas.height - 20, barWidth, 20);
                }

                // Overlays
                if (state === 'WAIT_CLEAR') {
                    this.ctx.fillStyle = '#ff0';
                    this.ctx.font = '80px monospace';
                    this.ctx.strokeStyle = '#000'; this.ctx.lineWidth = 4;
                    this.ctx.strokeText("Clear!!", 320, 280);
                    this.ctx.fillText("Clear!!", 320, 280);
                }
                if (state === 'WAIT_MISS') {
                    this.ctx.fillStyle = '#f00';
                    this.ctx.font = '80px monospace';
                    this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 4;
                    this.ctx.strokeText("Miss!!", 340, 280);
                    this.ctx.fillText("Miss!!", 340, 280);
                }
                if (state === 'WAIT_GAMEOVER') {
                    this.ctx.fillStyle = '#f00';
                    this.ctx.font = '80px monospace';
                    this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 4;
                    this.ctx.strokeText("GAME OVER", 280, 280);
                    this.ctx.fillText("GAME OVER", 280, 280);
                }
            }

            drawLevel(level) {
                for (let y = 0; y < level.rows; y++) {
                    for (let x = 0; x < level.cols; x++) {
                        const tileId = level.getTile(x, y);
                        this.ctx.drawImage(this.assets.getTile(0), x * this.tileWidth, y * this.tileHeight);
                        if (tileId !== 0) {
                            this.ctx.drawImage(this.assets.getTile(tileId), x * this.tileWidth, y * this.tileHeight);
                        }
                    }
                }
            }

            drawPlayer(player) {
                const px = player.x * 10;
                const py = player.y * 10;
                let sprite;
                if (player.sy < 0) sprite = player.faceRight ? this.assets.player.jumpRight : this.assets.player.jumpLeft;
                else if (player.sy > 0) sprite = player.faceRight ? this.assets.player.fallRight : this.assets.player.fallLeft;
                else sprite = player.faceRight ? this.assets.player.standRight : this.assets.player.standLeft;
                this.ctx.drawImage(sprite, px, py);
            }

            drawTitle(game) {
                if (game.hudLeft) game.hudLeft.textContent = "";
                if (game.hudRight) game.hudRight.textContent = "";

                this.ctx.fillStyle = '#fff';
                this.ctx.font = '60px monospace';
                this.ctx.fillText("MAGIC CRYSTAL", 260, 150);

                this.ctx.font = '30px monospace';
                this.ctx.fillStyle = game.titleCursor === 0 ? '#ff0' : '#888';
                this.ctx.fillText("GAME PLAY", 380, 300);
                this.ctx.fillStyle = game.titleCursor === 1 ? '#ff0' : '#888';
                this.ctx.fillText("MAP EDITOR", 380, 350);

                // FPS Display (Interactive)
                this.ctx.font = '20px monospace';
                this.ctx.fillStyle = '#aaa';
                this.ctx.fillText(`SPEED: ${game.targetFPS} FPS (< >)`, 380, 450);
            }

            drawSelect(game) {
                if (game.hudLeft) game.hudLeft.textContent = "";
                if (game.hudRight) game.hudRight.textContent = "";

                this.ctx.fillStyle = '#fff';
                this.ctx.font = '30px monospace';

                // Header
                const modeStr = (game.selectMode === 'PLAY') ? "SELECT STAGE" : "SELECT STAGE (EDITOR)";
                this.ctx.fillText(modeStr, 280, 40);

                // Lives Visual (Only in Play Mode)
                if (game.selectMode === 'PLAY') {
                    const lx = 600;
                    const ly = 20;
                    if (game.lives < 6) {
                        for (let i = 0; i < game.lives; i++) {
                            this.ctx.drawImage(this.assets.player.standRight, lx + i * 30, ly, 30, 30); // 30x30 scaled
                        }
                    } else {
                        this.ctx.drawImage(this.assets.player.standRight, lx, ly, 30, 30);
                        this.ctx.fillStyle = '#fff'; this.ctx.font = '24px monospace';
                        this.ctx.fillText("x " + game.lives, lx + 40, ly + 25);
                    }
                }

                this.ctx.font = '20px monospace';
                this.ctx.fillStyle = '#fff';
                this.ctx.fillText("X: BACK", 430, 520);

                const startX = 60;
                const startY = 80;
                const gapX = 85;
                const gapY = 85;
                // Mini-map size: 24x13 (x3 zoom = 72x39)

                for (let i = 0; i < 50; i++) {
                    const col = i % 10;
                    const row = Math.floor(i / 10);
                    const dx = startX + col * gapX;
                    const dy = startY + row * gapY;

                    // Draw Frame
                    this.ctx.strokeStyle = (i === game.selectCursor) ? '#ff0' : '#444';
                    this.ctx.lineWidth = (i === game.selectCursor) ? 3 : 1;
                    this.ctx.strokeRect(dx - 2, dy - 2, 76, 43);

                    // Draw Content (Simplified)
                    this.drawMiniMap(i, dx, dy);

                    // Dim if cleared
                    if (game.clearedStages[i] && game.selectMode === 'PLAY') {
                        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        this.ctx.fillRect(dx, dy, 72, 39);

                        this.ctx.fillStyle = '#ff0';
                        this.ctx.font = '14px monospace';
                        this.ctx.textAlign = 'center';
                        this.ctx.textBaseline = 'middle';
                        this.ctx.fillText("CLEAR", dx + 36, dy + 20); // Center: 72/2=36, 39/2~=20
                        this.ctx.textAlign = 'start'; // Reset
                        this.ctx.textBaseline = 'alphabetic'; // Reset
                    }

                    // Number
                    this.ctx.fillStyle = (game.clearedStages[i] && game.selectMode === 'PLAY') ? '#666' : '#fff';
                    this.ctx.font = '10px monospace';
                    this.ctx.fillText(i + 1, dx, dy - 5);
                }
            }

            drawMiniMap(index, dx, dy) {
                if (!ALL_LEVELS[index]) return;
                const level = ALL_LEVELS[index];
                const w = 3; // 3px per tile
                for (let y = 0; y < 13; y++) {
                    for (let x = 0; x < 24; x++) {
                        const t = level[y][x];
                        // Simpler Colors
                        if (t === 1) this.ctx.fillStyle = '#8B4513'; // Dirt
                        else if (t === 2) this.ctx.fillStyle = '#888'; // Rock/Wall
                        else if (t === 3) this.ctx.fillStyle = '#000'; // Portal
                        else if (t === 4) this.ctx.fillStyle = '#f00'; // Red
                        else if (t === 5) this.ctx.fillStyle = '#00f'; // Blue
                        else this.ctx.fillStyle = '#222'; // Empty

                        this.ctx.fillRect(dx + x * w, dy + y * w, w, w);
                    }
                }
            }
        }

        // --- PHYSICS SEGMENT ---
        class Physics {
            update(player, level, input, game) {
                const gridX = Math.floor(player.x / 4);
                const gridY = Math.floor(player.y / 4);
                const subX = player.x % 4;
                const subY = player.y % 4;
                const isAligned = (subX === 0 && subY === 0);

                if (typeof player.sx === 'undefined') player.sx = 0;
                if (typeof player.sy === 'undefined') player.sy = 0;

                if (player.jumpState > 0) {
                    // === JUMP/FALL ===
                    if (isAligned) {
                        let sx = 0, sy = 0;
                        let dir = player.faceRight ? 1 : -1;
                        if (this.isSolid(level.getTile(gridX + dir, gridY))) sx = 0; else sx = dir;

                        let vDir = (player.jumpState === 1) ? 1 : -1;
                        const tileVertical = level.getTile(gridX, gridY + vDir);
                        if (this.isSolid(tileVertical)) {
                            sy = 0;
                            // Reverted: BASIC behavior is to slide (SY=0, JS continues).
                        } else {
                            sy = vDir;
                        }

                        if (player.y <= 0 && vDir === -1) sy = 0;
                        if (player.jumpState === 5 && sx !== 0) sy = 0;

                        if (sx !== 0 && sy !== 0) {
                            if (this.isSolid(level.getTile(gridX + sx, gridY + sy))) sx = 0;
                        }

                        player.sx = sx; player.sy = sy;
                    }

                    if (player.jumpState > 1) player.jumpState--;

                    const nextX = player.x + player.sx;
                    const nextY = player.y + player.sy;
                    const isNextAligned = (nextX % 4 === 0 && nextY % 4 === 0);

                    if (isNextAligned) {
                        const nextGridX = nextX / 4;
                        const nextGridY = nextY / 4;
                        const tileBelowDest = level.getTile(nextGridX, nextGridY + 1);
                        if (this.isSolid(tileBelowDest)) {
                            player.jumpState = 0; // Land
                        }
                    }

                    player.x += player.sx;
                    player.y += player.sy;
                } else {
                    // === WALK (JS=0) ===
                    // If moving horizontally (subX != 0), continue horizontal movement
                    if (subX !== 0) {
                        player.sy = 0;
                        player.x += player.sx;
                    }
                    // If moving vertically (falling, subY != 0), continue vertical fall
                    else if (subY !== 0) {
                        player.sx = 0; player.sy = 1; // Enforce vertical drop
                        player.x += player.sx;
                        player.y += player.sy;
                    } else {
                        // Aligned: Check Below
                        const tileBelow = level.getTile(gridX, gridY + 1);
                        if (this.isSolid(tileBelow)) {
                            player.sx = 0; player.sy = 0;
                            this.processInput(player, level, input, game);
                        } else {
                            // Start Fall (Stay in JS=0)
                            player.sx = 0; player.sy = 1;
                            player.x += player.sx;
                            player.y += player.sy;
                        }
                    }
                }

                // Check Collection (Post Movement, if Aligned)
                // BASIC Line 410: if not moving (aligned), check collection
                const finalSubX = player.x % 4;
                const finalSubY = player.y % 4;
                if (finalSubX === 0 && finalSubY === 0) {
                    this.checkCollection(player, level, game);
                }
            }

            checkCollection(player, level, game) {
                const gridX = Math.floor(player.x / 4);
                const gridY = Math.floor(player.y / 4);
                const tile = level.getTile(gridX, gridY);

                // Buried Check (Failure)
                // BASIC Line 440: IF SC=1 OR SC=2 GOTO 700
                if (tile === 1 || tile === 2) {
                    if (game) game.handleGameOver();
                    return;
                }

                // Crystal Collection (BASIC Line 415-435)
                if (tile === 4 || tile === 5) {
                    const newTile = tile + 2; // 4->6 (Trace1), 5->7 (Trace2)
                    level.setTile(gridX, gridY, newTile);

                    if (game) {
                        game.crystalCount--;
                        game.ES = 0; // Always reset ES first (Line 435)
                        if (tile === 4) game.ES = 60; // Set ES only for Red Crystal (4)
                    }
                }

                // Clear Check (Portal)
                // BASIC Line 442: IF SC=3 AND CN=0 GOTO 500
                if (tile === 3 && game && game.crystalCount === 0) {
                    game.handleLevelClear();
                }
            }

            processInput(player, level, input, game) {
                if (player.turnWait > 0) { player.turnWait--; return; }

                // Digging (Down)
                if (input.stick === 5) {
                    const gridX = Math.floor(player.x / 4);
                    const gridY = Math.floor(player.y / 4);
                    const tileBelow = level.getTile(gridX, gridY + 1);
                    if (tileBelow === 1) { // Only Dig Dirt (1)
                        level.setTile(gridX, gridY + 1, 6); // Turn into Dirt 2 (6)
                        player.sx = 0; player.sy = 0;
                        player.turnWait = 8; // Re-added delay (8 frames @ 45fps ~= 177ms)
                        return;
                    }
                }

                // Smart Keys (Q/E)
                // Q: If Right -> Turn Left (Immed). If Left -> Jump (9).
                if (input.smartLeft) {
                    if (player.faceRight) {
                        player.faceRight = false;
                        return;
                    } else {
                        player.jumpState = 9; return;
                    }
                }
                // E: If Left -> Turn Right (Immed). If Right -> Jump (9).
                if (input.smartRight) {
                    if (!player.faceRight) {
                        player.faceRight = true;
                        return;
                    } else {
                        player.jumpState = 9; return;
                    }
                }

                // Standard Inputs
                if (input.stick === 1 || input.stick === 8 || input.stick === 2) {
                    player.jumpState = 9; return;
                }
                if (input.stick === 3) {
                    if (!player.faceRight) {
                        player.faceRight = true;
                        player.turnWait = 3; // Re-added delay (3 frames @ 45fps ~= 66ms)
                        return;
                    }
                    if (this.canMove(player, level, 1, 0, game)) { player.sx = 1; player.sy = 0; player.x += 1; }
                } else if (input.stick === 7) {
                    if (player.faceRight) {
                        player.faceRight = false;
                        player.turnWait = 3; // Re-added delay
                        return;
                    }
                    if (this.canMove(player, level, -1, 0, game)) { player.sx = -1; player.sy = 0; player.x -= 1; }
                }
            }
            canMove(player, level, dx, dy) {
                const gridX = Math.floor(player.x / 4) + dx;
                const gridY = Math.floor(player.y / 4) + dy;
                const tile = level.getTile(gridX, gridY);
                if (this.isSolid(tile)) return false;
                // Collection removed from here
                return true;
            }
            isSolid(tileId) { return (tileId === 1 || tileId === 2); }
        }

        // --- GAME SEGMENT ---
        class Game {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');

                // HIGH RES UPDATE: 40x40 per tile
                this.tileWidth = 40;
                this.tileHeight = 40;
                // LOGIC SIZE RESTORE: 24x13 (Matches Original Design)
                this.cols = 24;
                this.rows = 13;

                this.canvas.width = this.cols * this.tileWidth; // 960px
                this.canvas.height = this.rows * this.tileHeight + 20; // 520+20 = 540px

                this.assets = new Assets();

                this.input = new Input();
                this.level = new Level(this.cols, this.rows);
                this.physics = new Physics();
                this.editor = new LevelEditor(this.level);
                this.renderer = new Renderer(this.ctx, this.assets);

                this.targetFPS = 45;
                this.deltaTime = 1000 / this.targetFPS;
                this.accumulator = 0;

                // --- STATE MANAGEMENT ---
                this.state = 'TITLE';
                this.lives = 3;
                this.maxLives = 9;
                this.clearedStages = new Array(50).fill(false);
                this.stage = 0;
                this.stateTimer = 0;

                // UI State
                this.titleCursor = 0;
                this.selectCursor = 0;
                this.selectMode = 'PLAY';

                this.hudLeft = document.getElementById('hud-left');
                this.hudRight = document.getElementById('hud-right');

                // Cache Player Icon for HUD
                this.playerIconUrl = this.assets.player.standRight.toDataURL();

                this.crystalCount = 0;
                this.ES = 0;

                console.log("GAME INIT");

                // Loop
                this.lastTime = performance.now();
                this.loop(this.lastTime);
            }

            // ... (Load/Save omitted, no changes needed) ...

            // Need to keep original methods intact or we break file structure
            // View showed loadStage at 924. I am replacing from 891 (Before State Management)
            // But replacing huge chunk is risky if I don't provide loadStage content.
            // I should target smaller chunks.
            // RETRYING WITH SMALLER CHUNKS FOR SAFETY.

            // CHUNK 1: Constructor & Variable Init
            // CHUNK 2: updateTitle method

            // Re-targeting below.


            loadStage(index) {
                this.stage = index;
                this.level.loadStage(index);
                this.resetPlayer();
                this.hudRight.textContent = "STAGE " + (this.stage + 1);
            }

            resetPlayer() {
                let startX = 4, startY = 4;
                this.crystalCount = 0;
                for (let y = 0; y < this.level.rows; y++) {
                    for (let x = 0; x < this.level.cols; x++) {
                        if (this.level.data[y][x] === 3) { startX = x * 4; startY = y * 4; }
                        if (this.level.data[y][x] === 4 || this.level.data[y][x] === 5) this.crystalCount++;
                    }
                }
                this.player = { x: startX, y: startY, vx: 0, vy: 0, jumpState: 0, faceRight: true, lives: 3, turnWait: 0 };
                this.ES = 0; // Earthquake Switch
            }

            saveLevel() {
                localStorage.setItem('magic_crystal_level', this.level.serialize());
                console.log("Level Saved");
                this.hudRight.textContent = "SAVED!";
                localStorage.setItem('magic_crystal_level', this.level.serialize());
                console.log("Level Saved");
                this.hudRight.textContent = "SAVED!";
                setTimeout(() => this.hudRight.textContent = "STAGE " + (this.stage + 1), 1000);
            }

            loadLevel() {
                const data = localStorage.getItem('magic_crystal_level');
                if (data) {
                    this.level.deserialize(data);
                    this.resetPlayer();
                    console.log("Level Loaded");
                }
            }

            start() { this.running = true; this.lastTime = performance.now(); requestAnimationFrame(this.loop.bind(this)); }

            loop(timestamp) {
                if (!this.running) return;
                const frameTime = timestamp - this.lastTime; this.lastTime = timestamp; this.accumulator += frameTime;

                while (this.accumulator >= this.deltaTime) {
                    this.input.updateState(); // Poll Input
                    this.update(); // Update Logic

                    // Reset Input Flags
                    this.input.prevUp = this.input.keys.ArrowUp || this.input.keys.w || this.input.keys['8'];
                    this.input.prevDown = this.input.keys.ArrowDown || this.input.keys.s || this.input.keys['2'];
                    this.input.prevLeft = this.input.keys.ArrowLeft || this.input.keys.a || this.input.keys['4'];
                    this.input.prevRight = this.input.keys.ArrowRight || this.input.keys.d || this.input.keys['6'];
                    this.input.prevX = this.input.keys.x;
                    this.input.prevJump = this.input.jump;
                    this.input.prevConfirm = this.input.confirm;

                    this.accumulator -= this.deltaTime;
                }

                this.render(); // Delegated Render
                requestAnimationFrame(this.loop.bind(this));
            }

            update() {
                // Timer Logic
                if (this.stateTimer > 0) {
                    this.stateTimer -= this.deltaTime / 1000;
                    if (this.stateTimer <= 0) {
                        this.stateTimer = 0;
                        this.onTimerEnd();
                    }
                }

                switch (this.state) {
                    case 'TITLE': this.updateTitle(); break;
                    case 'SELECT': this.updateSelect(); break;
                    case 'WAIT_START': break; // Wait for timer (handled in update top)
                    case 'PLAY': this.updatePlay(); break;
                    case 'EDITOR':
                        if (this.input.keys.x && !this.input.prevX) { this.state = 'SELECT'; }
                        else { this.editor.update(this.input); }
                        break;
                    case 'GAMEOVER': if (this.input.confirm && !this.input.prevConfirm) this.state = 'TITLE'; break;
                    case 'ALLCLEAR': if (this.input.confirm && !this.input.prevConfirm) this.state = 'TITLE'; break;
                }
            }

            onTimerEnd() {
                if (this.state === 'WAIT_MISS') {
                    if (this.lives > 0) this.state = 'SELECT';
                    else this.state = 'GAMEOVER'; // Logical Fallback if lives went to 0 but state was WAIT_MISS
                } else if (this.state === 'WAIT_CLEAR') {
                    if (this.clearedStages.every(Boolean)) this.state = 'ALLCLEAR';
                    else this.state = 'SELECT';
                } else if (this.state === 'WAIT_GAMEOVER') {
                    this.state = 'TITLE';
                } else if (this.state === 'WAIT_START') {
                    this.state = 'PLAY';
                }
            }

            updateTitle() {
                const up = (this.input.keys.ArrowUp || this.input.keys.w || this.input.keys['8']) && !this.input.prevUp;
                const down = (this.input.keys.ArrowDown || this.input.keys.s || this.input.keys['2']) && !this.input.prevDown;
                if (up || down) this.titleCursor = 1 - this.titleCursor;

                // FPS Adjustment (Left/Right)
                const left = (this.input.keys.ArrowLeft || this.input.keys.a || this.input.keys['4']) && !this.input.prevLeft;
                const right = (this.input.keys.ArrowRight || this.input.keys.d || this.input.keys['6']) && !this.input.prevRight;

                if (left) {
                    this.targetFPS = Math.max(10, this.targetFPS - 5);
                    this.deltaTime = 1000 / this.targetFPS;
                }
                if (right) {
                    this.targetFPS = Math.min(60, this.targetFPS + 5);
                    this.deltaTime = 1000 / this.targetFPS;
                }

                if (this.input.confirm && !this.input.prevConfirm) {
                    if (this.titleCursor === 0) {
                        this.selectMode = 'PLAY';
                        this.lives = 3;
                        this.clearedStages = new Array(50).fill(false); // Reset Progress
                        this.state = 'SELECT';
                    } else {
                        this.selectMode = 'EDIT';
                        this.state = 'SELECT';
                    }
                }
            }

            updateSelect() {
                // Exit to Title
                if (this.input.keys.x && !this.input.prevX) {
                    this.state = 'TITLE';
                    return;
                }

                const left = (this.input.keys.ArrowLeft || this.input.keys.a || this.input.keys['4']) && !this.input.prevLeft;
                const right = (this.input.keys.ArrowRight || this.input.keys.d || this.input.keys['6']) && !this.input.prevRight;
                const up = (this.input.keys.ArrowUp || this.input.keys.w || this.input.keys['8']) && !this.input.prevUp;
                const down = (this.input.keys.ArrowDown || this.input.keys.s || this.input.keys['2']) && !this.input.prevDown;

                if (right) this.selectCursor = (this.selectCursor + 1) % 50;
                if (left) this.selectCursor = (this.selectCursor + 49) % 50;
                if (down) this.selectCursor = (this.selectCursor + 10) % 50;
                if (up) this.selectCursor = (this.selectCursor + 40) % 50;

                if (this.input.confirm && !this.input.prevConfirm) {
                    if (this.selectMode === 'PLAY') {
                        // Allow playing any stage (unlocked check removed for debugging/ease)
                        // Original logic checked clearedStages.
                        // User wants to play Stage 11 which is later?
                        // Let's allow selecting any stage for now or keep logic.
                        // Logic says: if (!this.clearedStages[this.selectCursor])...
                        // This prevents RE-PLAYING cleared stages?
                        // Original game usually allows replaying.
                        // I'll allow replaying by removing the !cleared check.
                        this.loadStage(this.selectCursor);
                        this.state = 'WAIT_START';
                        this.stateTimer = 1.0; // 1 Second Ready Phase
                    } else {
                        this.loadStage(this.selectCursor);
                        this.state = 'EDITOR';
                    }
                }
            }

            updatePlay() {
                this.physics.update(this.player, this.level, this.input, this);
                if (this.ES > 0) this.ES--;
                if (this.ES === 1) this.level.applyEarthquake();
                if (this.input.giveUp) this.handleGameOver();
            }

            render() {
                this.renderer.render(this.level, this.player, this.editor, this.state, this.ES, this);
            }

            handleGameOver() {
                this.lives--;
                if (this.lives > 0) {
                    console.log("MISS!");
                    this.state = 'WAIT_MISS';
                    this.stateTimer = 1.0;
                } else {
                    console.log("GAME OVER!");
                    this.state = 'WAIT_GAMEOVER';
                    this.stateTimer = 3.0; // 3 Seconds
                }
                this.running = true;
            }

            handleLevelClear() {
                console.log("LEVEL CLEAR");
                this.clearedStages[this.stage] = true;
                if (this.lives < this.maxLives) this.lives++;
                this.state = 'WAIT_CLEAR';
                this.stateTimer = 1.0;
                this.running = true;
            }
        }

        window.onload = () => {
            new Game(document.getElementById('game-canvas')).start();
        };
    </script>
