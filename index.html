<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Magic Crystal (Split Version)</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling */
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            font-family: 'Courier New', monospace;
            color: #fff;
            touch-action: none;
            /* Prevent default touch actions like scroll/zoom */
        }

        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-layer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, 0);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 960px;
            height: 640px;
            padding-top: 0;
            /* No spacing from top */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #4a4e69;
            box-sizing: content-box;
            /* Ensure border doesn't eat into canvas size */
            transform-origin: top center;
        }

        canvas {
            display: block;
            background-color: #000;
            image-rendering: pixelated;
            width: 960px;
            height: 640px;
        }

        /* Touch Controls Overlay */
        #touch-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let touches pass through to game/canvas if not on buttons */
            z-index: 100;
        }

        /* Numpad Grid (3x3) - Container for buttons */
        .numpad-grid {
            position: absolute;
            /* Absolute positioning controlled by JS */
            display: grid;
            grid-template-columns: 80px 80px 80px;
            grid-template-rows: 80px 80px 80px;
            gap: 15px;
            pointer-events: auto;
            /* Re-enable pointer events for buttons */
            transform-origin: bottom center;
            /* Scale from bottom */
        }

        /* Secondary pad default hidden, controlled by JS */
        .secondary-pad {
            display: none;
        }

        /* Button Styles */
        #touch-controls .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ddd;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            font-size: 32px;
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        #touch-controls .btn:active,
        #touch-controls .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Specific Button Styles */
        .smart-q,
        .smart-e {
            background: rgba(255, 200, 0, 0.15) !important;
            border-color: rgba(255, 200, 0, 0.4) !important;
            font-size: 28px !important;
        }

        .action-b {
            background: rgba(255, 80, 80, 0.2) !important;
            border-radius: 50% !important;
        }

        .action-a {
            background: rgba(80, 80, 255, 0.2) !important;
            border-radius: 50% !important;
        }

        /* Drag Handle */
        .drag-handle {
            visibility: hidden;
            /* Use visibility to keep layout space */
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            /* Text hidden */
            font-size: 40px;
            cursor: move;
            user-select: none;
            touch-action: none;
            background: rgba(255, 255, 0, 0.1);
            /* Faint yellow fill */
            border-radius: 50%;
            border: 3px solid #ff0;
            /* Thick yellow border */
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            /* Include border in size */
        }

        /* Visible state class */
        .drag-handle.visible {
            visibility: visible;
        }

        /* Hide controls on Non-Touch if desired, but kept for testing */
        @media (hover: hover) and (pointer: fine) {
            /* PC: Optional styling updates if needed */
        }
    </style>
</head>

<body>
    <div id="viewport">
        <div id="game-layer">
            <div id="game-container">
                <canvas id="game-canvas" width="480" height="280"></canvas>
            </div>
        </div>

        <!-- Touch Controls (Overlay) -->
        <div id="touch-controls">
            <!-- Primary Pad -->
            <div class="numpad-grid primary-pad">
                <!-- Row 7, 8, 9 -->
                <button class="btn smart-q" data-key="q">↖</button>
                <button class="btn d-up" data-key="ArrowUp">▲</button>
                <button class="btn smart-e" data-key="e">↗</button>

                <!-- Row 4, 5, 6 -->
                <button class="btn d-left" data-key="ArrowLeft">◀</button>
                <div class="drag-handle"></div>
                <button class="btn d-right" data-key="ArrowRight">▶</button>

                <!-- Row 1, 2, 3 -->
                <button class="btn action-a" data-key="z">A</button>
                <button class="btn d-down" data-key="ArrowDown">▼</button>
                <button class="btn action-b" data-key="x">B</button>
            </div>

            <!-- Secondary Pad (For Dual Mode) -->
            <div class="numpad-grid secondary-pad">
                <!-- Row 7, 8, 9 -->
                <button class="btn smart-q" data-key="q">↖</button>
                <button class="btn d-up" data-key="ArrowUp">▲</button>
                <button class="btn smart-e" data-key="e">↗</button>

                <!-- Row 4, 5, 6 -->
                <button class="btn d-left" data-key="ArrowLeft">◀</button>
                <div class="drag-handle"></div>
                <button class="btn d-right" data-key="ArrowRight">▶</button>

                <!-- Row 1, 2, 3 -->
                <button class="btn action-a" data-key="z">A</button>
                <button class="btn d-down" data-key="ArrowDown">▼</button>
                <button class="btn action-b" data-key="x">B</button>
            </div>
        </div>
    </div>

    <!-- Scripts (Order Matters) -->
    <script src="game/levels.js"></script>
    <script src="game/Assets.js"></script>
    <script src="game/Input.js"></script>
    <script src="game/Level.js"></script> <!-- Includes Level and LevelEditor -->
    <script src="game/Physics.js"></script>
    <script src="game/Renderer.js"></script>
    <script src="game/Game.js"></script>
    <script src="game/main.js"></script>
</body>

</html>
