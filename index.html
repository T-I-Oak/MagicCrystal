<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Magic Crystal (Split Version)</title>
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            /* Start from top so we can see scrolling if needed */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
            /* Allow scroll */
            padding: 20px 0;
            font-family: 'Courier New', monospace;
            color: #fff;
        }



        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #4a4e69;
        }

        canvas {
            display: block;
            background-color: #000;
            image-rendering: pixelated;
            width: 960px;
            /* 24 * 40 = 960 */
            height: 640px;
            /* 13 * 40 + 120 = 640 */
        }

        /* Touch Controls Area */
        #touch-controls {
            position: relative;
            /* Document flow */
            width: 960px;
            /* Match canvas width */
            height: auto;
            margin-top: 10px;
            display: flex;
            /* Justify controlled by JS class */
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: transparent;
            border: none;
        }

        /* Pad Modes */
        #touch-controls.mode-center {
            justify-content: center;
        }

        #touch-controls.mode-left {
            justify-content: flex-start;
        }

        #touch-controls.mode-right {
            justify-content: flex-end;
        }

        #touch-controls.mode-dual {
            justify-content: space-between;
        }

        #touch-controls.mode-left .secondary-pad {
            display: none !important;
        }

        #touch-controls.mode-center .secondary-pad {
            display: none !important;
        }

        #touch-controls.mode-right .secondary-pad {
            display: none !important;
        }

        #touch-controls.mode-dual .secondary-pad {
            display: grid !important;
        }

        /* Numpad Grid (3x3) */
        .numpad-grid {
            display: grid;
            grid-template-columns: 80px 80px 80px;
            /* Slightly larger */
            grid-template-rows: 80px 80px 80px;
            gap: 15px;
        }

        #touch-controls .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ddd;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            font-size: 32px;
            /* Larger icons */
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #touch-controls .btn:active,
        #touch-controls .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Specific Button Styles */
        .smart-q,
        .smart-e {
            background: rgba(255, 200, 0, 0.15) !important;
            border-color: rgba(255, 200, 0, 0.4) !important;
            font-size: 28px !important;
        }

        .action-b {
            background: rgba(255, 80, 80, 0.2) !important;
            border-radius: 50% !important;
            /* Keep roundish shape distinction */
        }

        .action-a {
            background: rgba(80, 80, 255, 0.2) !important;
            border-radius: 50% !important;
        }

        @media (min-width: 1024px) {

            /* Keep visible for testing on PC */
            #touch-controls {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas" width="480" height="280"></canvas>
    </div>

    <!-- Touch Controls (Outside Canvas) -->
    <div id="touch-controls" class="mode-center">
        <!-- Primary Pad -->
        <div class="numpad-grid primary-pad">
            <!-- Row 7, 8, 9 -->
            <button class="btn smart-q" data-key="q">↖</button>
            <button class="btn d-up" data-key="ArrowUp">▲</button>
            <button class="btn smart-e" data-key="e">↗</button>

            <!-- Row 4, 5, 6 -->
            <button class="btn d-left" data-key="ArrowLeft">◀</button>
            <div class="empty-slot"></div>
            <button class="btn d-right" data-key="ArrowRight">▶</button>

            <!-- Row 1, 2, 3 -->
            <button class="btn action-a" data-key="z">A</button>
            <button class="btn d-down" data-key="ArrowDown">▼</button>
            <button class="btn action-b" data-key="x">B</button>
        </div>

        <!-- Secondary Pad (For Dual Mode) -->
        <div class="numpad-grid secondary-pad" style="display: none;">
            <!-- Row 7, 8, 9 -->
            <button class="btn smart-q" data-key="q">↖</button>
            <button class="btn d-up" data-key="ArrowUp">▲</button>
            <button class="btn smart-e" data-key="e">↗</button>

            <!-- Row 4, 5, 6 -->
            <button class="btn d-left" data-key="ArrowLeft">◀</button>
            <div class="empty-slot"></div>
            <button class="btn d-right" data-key="ArrowRight">▶</button>

            <!-- Row 1, 2, 3 -->
            <button class="btn action-a" data-key="z">A</button>
            <button class="btn d-down" data-key="ArrowDown">▼</button>
            <button class="btn action-b" data-key="x">B</button>
        </div>
    </div>

    <!-- Scripts (Order Matters) -->
    <script src="game/levels.js"></script>
    <script src="game/Assets.js"></script>
    <script src="game/Input.js"></script>
    <script src="game/Level.js"></script> <!-- Includes Level and LevelEditor -->
    <script src="game/Physics.js"></script>
    <script src="game/Renderer.js"></script>
    <script src="game/Game.js"></script>
    <script src="game/main.js"></script>
</body>

</html>
